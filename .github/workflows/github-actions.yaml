name: Python CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        env:
          DJANGO_DB_HOST: localhost
          DJANGO_DB_PORT: 5432
          DJANGO_DB_NAME: test_db
          DJANGO_DB_USER: test_user
          DJANGO_DB_PASSWORD: test_password
        run: |
          pip install uv
          make install
      - name: Run migrations
        run: |
          make migrate
          make apply migrations
      - name: Run tests
        run: |
          make test
      - name: Run linter
        run: |
          make lint
          
