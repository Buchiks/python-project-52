{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}


{% block title %}Index{% endblock %}
{% block content %}
<main class="form-signin px-5">
    <h1>{% translate "Registration" %}</h1>
    {% url 'user_create' as default_url %}
    <form action="{{ action_url|default:default_url }}" method="post">
        {% csrf_token %}
        <table border="1">
            {{ form }}
        </table>
        {% translate 'Registrate' as default_button %}
        <input type="submit" value="{{ button|default:default_button }}">
    </form>
</main>
{% endblock %}
