{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}


{% block title %}Index{% endblock %}
{% block content %}
<main class="form-signin px-5">
    <h1>{% translate "Registration" %}</h1>
    <form action="{% url 'user_create' %}" method="post">
        {% csrf_token %}
        <table border="1">
            {{ form }}
        </table>
        <input type="submit" value="{% translate 'Registrate' %}">
    </form>
</main>
{% endblock %}
