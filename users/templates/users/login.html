{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block content %}
{% if messages %}
{% for message in messages %}
<div class="alert {{ message.tags }} alert-dismissable fade show" role="alert">
    <strong>{{ message }}</strong>
</div>
{% endfor %}
{% endif %}
<div class="container wrapper flex-grow-1">
    <h1 class="my-4">{% translate "Login" %}</h1>

    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary">{% translate 'Sign in' %}</button>
    </form>

</div>
{% endblock content %}
